<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RigCheck — Live2D 리깅 QA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a; color: #e0e0e0; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1rem;
  }
  h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.25rem; }
  h1 span { color: #6ee7b7; }
  .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }

  /* Drop zone */
  .dropzone {
    width: 100%; max-width: 640px;
    border: 2px dashed #333; border-radius: 12px;
    padding: 3rem 2rem; text-align: center;
    cursor: pointer; transition: all 0.2s;
    margin-bottom: 2rem;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: #6ee7b7; background: rgba(110, 231, 183, 0.05);
  }
  .dropzone p { font-size: 1.1rem; margin-bottom: 0.5rem; }
  .dropzone small { color: #666; }
  .dropzone input { display: none; }

  /* Loading */
  .loading { display: none; text-align: center; margin: 2rem 0; }
  .loading.active { display: block; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #333;
    border-top-color: #6ee7b7; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results { width: 100%; max-width: 640px; display: none; }
  .results.active { display: block; }

  .summary {
    background: #111; border-radius: 12px; padding: 1.5rem;
    margin-bottom: 1.5rem; display: flex; gap: 1.5rem;
    align-items: center; flex-wrap: wrap;
  }
  .summary .model-name { font-size: 1.3rem; font-weight: 600; flex: 1; }
  .badge {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem;
    font-weight: 600;
  }
  .badge.critical { background: rgba(239,68,68,0.15); color: #ef4444; }
  .badge.warning { background: rgba(234,179,8,0.15); color: #eab308; }
  .badge.info { background: rgba(59,130,246,0.15); color: #3b82f6; }
  .badge.pass { background: rgba(110,231,183,0.15); color: #6ee7b7; }

  /* Rule cards */
  .rule-card {
    background: #111; border-radius: 10px; margin-bottom: 0.75rem;
    overflow: hidden;
  }
  .rule-header {
    padding: 1rem 1.25rem; display: flex; align-items: center;
    gap: 0.75rem; cursor: pointer; user-select: none;
  }
  .rule-header:hover { background: #1a1a1a; }
  .rule-status {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
  }
  .rule-status.pass { background: rgba(110,231,183,0.15); color: #6ee7b7; }
  .rule-status.fail { background: rgba(239,68,68,0.15); color: #ef4444; }
  .rule-name { flex: 1; font-weight: 500; }
  .rule-count { color: #666; font-size: 0.85rem; }
  .rule-arrow { color: #444; transition: transform 0.2s; }
  .rule-card.open .rule-arrow { transform: rotate(90deg); }

  .rule-findings {
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
  }
  .rule-card.open .rule-findings { max-height: 1000px; }

  .finding {
    padding: 0.75rem 1.25rem 0.75rem 3.5rem;
    border-top: 1px solid #1a1a1a;
  }
  .finding-severity {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    margin-right: 0.5rem; vertical-align: middle;
  }
  .finding-severity.critical { background: #ef4444; }
  .finding-severity.warning { background: #eab308; }
  .finding-severity.info { background: #3b82f6; }
  .finding-message { font-size: 0.9rem; }
  .finding-details { color: #666; font-size: 0.8rem; margin-top: 0.25rem; }

  .error {
    background: rgba(239,68,68,0.1); border: 1px solid #ef4444;
    border-radius: 10px; padding: 1rem 1.25rem; display: none;
    max-width: 640px; width: 100%;
  }
  .error.active { display: block; }

  .reset-btn {
    margin-top: 1.5rem; padding: 0.6rem 1.5rem;
    background: #222; color: #aaa; border: 1px solid #333;
    border-radius: 8px; cursor: pointer; font-size: 0.9rem;
  }
  .reset-btn:hover { background: #2a2a2a; color: #fff; }
</style>
</head>
<body>

<h1><span>Rig</span>Check</h1>
<p class="subtitle">Live2D 리깅 QA 자동화 도구</p>

<div class="dropzone" id="dropzone">
  <p>runtime 폴더를 ZIP으로 압축해서 드래그하세요</p>
  <small>.model3.json, .cdi3.json, .physics3.json 등이 포함된 ZIP 파일</small>
  <input type="file" id="fileInput" accept=".zip">
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>검사 중...</p>
</div>

<div class="error" id="error"></div>

<div class="results" id="results">
  <div class="summary" id="summary"></div>
  <div id="ruleCards"></div>
  <button class="reset-btn" onclick="resetUI()">다시 검사</button>
</div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const loading = document.getElementById('loading');
const errorEl = document.getElementById('error');
const results = document.getElementById('results');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if (e.target.files.length) uploadFile(e.target.files[0]);
});

async function uploadFile(file) {
  if (!file.name.endsWith('.zip')) {
    showError('ZIP 파일만 지원합니다. runtime 폴더를 ZIP으로 압축해주세요.');
    return;
  }

  dropzone.style.display = 'none';
  errorEl.classList.remove('active');
  results.classList.remove('active');
  loading.classList.add('active');

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('/api/check', { method: 'POST', body: formData });
    const data = await res.json();

    loading.classList.remove('active');

    if (!res.ok) {
      showError(data.error || '서버 오류가 발생했습니다.');
      return;
    }

    renderResults(data);
  } catch (err) {
    loading.classList.remove('active');
    showError('서버에 연결할 수 없습니다. 서버가 실행 중인지 확인하세요.');
  }
}

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.add('active');
  dropzone.style.display = '';
}

function renderResults(data) {
  // Summary
  const summary = document.getElementById('summary');
  summary.innerHTML = `
    <div class="model-name">${data.model_name}</div>
    ${data.critical_count > 0 ? `<span class="badge critical">Critical ${data.critical_count}</span>` : ''}
    ${data.warning_count > 0 ? `<span class="badge warning">Warning ${data.warning_count}</span>` : ''}
    ${data.info_count > 0 ? `<span class="badge info">Info ${data.info_count}</span>` : ''}
    ${data.total_findings === 0 ? '<span class="badge pass">All Clear</span>' : ''}
  `;

  // Rule cards
  const cards = document.getElementById('ruleCards');
  cards.innerHTML = data.results.map((rule, i) => `
    <div class="rule-card${rule.findings.length > 0 ? ' open' : ''}" onclick="this.classList.toggle('open')">
      <div class="rule-header">
        <div class="rule-status ${rule.passed ? 'pass' : 'fail'}">${rule.passed ? 'OK' : '!'}</div>
        <span class="rule-name">${rule.rule_name}</span>
        <span class="rule-count">${rule.findings.length > 0 ? rule.findings.length + '건' : ''}</span>
        <span class="rule-arrow">&#9654;</span>
      </div>
      <div class="rule-findings">
        ${rule.findings.map(f => `
          <div class="finding">
            <span class="finding-severity ${f.severity}"></span>
            <span class="finding-message">${f.message}</span>
            ${f.details ? `<div class="finding-details">${f.details}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  results.classList.add('active');
}

function resetUI() {
  results.classList.remove('active');
  dropzone.style.display = '';
  fileInput.value = '';
}
</script>

</body>
</html>
